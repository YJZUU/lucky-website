<!DOCTYPE html>
<html lang = "ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 얼마나 빠른가 보겠어요👀 </title>
    <link rel="stylesheet" href="./css/typing.css">
    <link rel="icon" type="image/png" href="./img/pixel/play_music.gif"/>
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" rel="stylesheet">

    <script>
        // 우클릭 금지
        document.addEventListener('contextmenu', function (e) {
          e.preventDefault();
        });
      
        // 단축키 금지 (F12, Ctrl+Shift+I, Ctrl+U 등)
        document.addEventListener('keydown', function (e) {
          if (
            e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || 
            (e.ctrlKey && e.key === 'U') || 
            (e.ctrlKey && e.key === 'S') || 
            (e.ctrlKey && e.key === 'P')
          ) {
            e.preventDefault();
          }
        });
      
        // 개발자 도구 감지 및 차단 (화면 크기 변화 감지)
        (function() {
          const threshold = 160; // 개발자 도구 감지 기준
          const detectDevTools = () => {
            const widthThreshold = window.outerWidth - window.innerWidth > threshold;
            const heightThreshold = window.outerHeight - window.innerHeight > threshold;
      
            if (widthThreshold || heightThreshold) {
              document.body.innerHTML = ""; // 화면 내용을 비움
            }
          };
          setInterval(detectDevTools, 1000); // 1초마다 감지
        })();
      </script>
</head>

<body>
    <h2><a href="index.html">HOME으로 가기...🏠</a></h2>
    
    <p> 문자가 사라지기 전에 빠르게 입력하세요! </p>
  
        <div class="container">
        <h1>👑🏆타자왕 선발 대회💻🎖️</h1>
        <select id="difficulty-select">
            <option value="easy">초급</option>
            <option value="hard">매우 어려움</option>
        </select>

        <div id="game-area">
        </div>

        <div id="game-controls">
            <input type="text" id="input" placeholder="이곳에 단어를 입력하고 엔터를 눌러 주세요!" autofocus>
            <p>제한 시간은 30초입니다.</p>
            <p>Time Left: <span id="time">30</span>s</p>
            <p>Score: <span id="score">0</span></p>
            <button id="start-button">Start Game</button>
        </div>

        <div id="notice">
            <p>두 글자: 1점</p>
            <p>세 글자: 2점</p>
            <p>네 글자: 3점</p>
            <p>다섯 글자 이상: 4점</p>
            <p>글자 입력 실패: -1점</p>
        </div>

        </div>
    <script src="./js/typing.js"></script>
</body>
</html>
