<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> 🤍행운 색상 테스트 </title>
        <link rel="stylesheet" href="./css/color.css">
        <link rel="icon" type="image/png" href="./img/pixel/play_music.gif"/>
        <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css" rel="stylesheet">

        <script>
            // 우클릭 금지
            document.addEventListener('contextmenu', function (e) {
              e.preventDefault();
            });
          
            // 단축키 금지 (F12, Ctrl+Shift+I, Ctrl+U 등)
            document.addEventListener('keydown', function (e) {
              if (
                e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || 
                (e.ctrlKey && e.key === 'U') || 
                (e.ctrlKey && e.key === 'S') || 
                (e.ctrlKey && e.key === 'P')
              ) {
                e.preventDefault();
              }
            });
          
            // 개발자 도구 감지 및 차단 (화면 크기 변화 감지)
            (function() {
              const threshold = 160; // 개발자 도구 감지 기준
              const detectDevTools = () => {
                const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                const heightThreshold = window.outerHeight - window.innerHeight > threshold;
          
                if (widthThreshold || heightThreshold) {
                  document.body.innerHTML = ""; // 화면 내용을 비움
                }
              };
              setInterval(detectDevTools, 1000); // 1초마다 감지
            })();
          </script>
    </head>

    
    <body>
        <h3><a href="index.html">HOME으로 가기...</a></h3>
        <p><a href="테스트.html">다른 테스트도 해 보기!</a></p>
        <h1>🤍행운 색상 테스트</h1>
        <h2>현재 나에게 가장 어울리는 행운의 색을 추천합니다.</h2>

        <div id="test-container">
            <!-- 질문 번호 -->
            <div id="progress"></div>
            <!-- 질문 텍스트 -->
            <div id="question"></div>
            <!-- 선택지 버튼 -->
            <div id="options"></div>
        </div>
        <script src="./js/color.js"></script>

    </body>


</html>
